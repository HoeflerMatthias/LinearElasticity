services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    command: mlflow server --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts

  firedrake:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MLFLOW_TRACKING_URI=http://host.docker.internal:8080

  odil:
    build:
      context: .
      dockerfile: Dockerfile.odil
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MLFLOW_TRACKING_URI=http://host.docker.internal:8080

  pinns:
    build:
      context: .
      dockerfile: Dockerfile.pinns
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MLFLOW_TRACKING_URI=http://host.docker.internal:8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["4", "5", "6", "7"]
              capabilities: [gpu]

volumes:
  mlflow-data: